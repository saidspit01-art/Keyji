<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Keyji — Каналы</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    :root { --orange:#FF6B00; --orange-light:#FF8C38; --nav-height:72px; }
    body { font-family:'Montserrat',sans-serif; min-height:100vh; overflow:hidden; background:#f5f0eb; }
    body.dark { background:#0a0a0a; }
    .bg-image { position:fixed; inset:0; z-index:0; background-size:cover; background-position:center; }
    body.light .bg-image { background-image:url('https://i.ibb.co/zTS53bWc/file-000000004b807246a5c9c164255caecf.jpg'); }
    body.dark .bg-image { background-image:url('https://i.ibb.co/Pv1Y3F9T/file-0000000062f47246b948af6a043288a5.jpg'); }
    body.light .bg-overlay { background:rgba(255,255,255,0.2); }
    body.dark .bg-overlay { background:rgba(0,0,0,0.4); }
    .bg-overlay { position:fixed; inset:0; z-index:1; }
    .app { position:fixed; inset:0; z-index:2; display:flex; flex-direction:column; }

    .header {
      display:flex; align-items:center; justify-content:space-between;
      padding:52px 16px 14px;
      background:rgba(255,255,255,0.45); backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(255,255,255,0.6);
    }
    body.dark .header { background:rgba(0,0,0,0.5); border-bottom-color:rgba(255,255,255,0.08); }
    .header-title { font-family:'Noto Serif JP',serif; font-size:22px; font-weight:700; color:#1a1a1a; }
    body.dark .header-title { color:white; }
    .new-btn {
      padding:8px 16px; border-radius:12px; border:none;
      background:var(--orange); color:white;
      font-family:'Montserrat',sans-serif; font-size:13px; font-weight:700;
      cursor:pointer; transition:all 0.2s; box-shadow:0 4px 12px rgba(255,107,0,0.3);
    }
    .new-btn:active { transform:scale(0.95); background:var(--orange-light); }

    .tabs {
      display:flex; padding:12px 16px;
      background:rgba(255,255,255,0.3); backdrop-filter:blur(10px); gap:8px;
    }
    body.dark .tabs { background:rgba(0,0,0,0.3); }
    .tab { flex:1; padding:10px; text-align:center; font-size:13px; font-weight:600; color:#999; cursor:pointer; border-radius:12px; transition:all 0.2s; }
    .tab.active { background:var(--orange); color:white; box-shadow:0 4px 12px rgba(255,107,0,0.3); }

    .content { flex:1; overflow-y:auto; padding:8px 0 calc(var(--nav-height)+16px); }
    .content::-webkit-scrollbar { display:none; }

    .channel-card {
      margin:4px 12px; padding:14px 16px;
      border-radius:18px;
      background:rgba(255,255,255,0.5); border:1px solid rgba(255,255,255,0.7);
      backdrop-filter:blur(12px); cursor:pointer; transition:all 0.2s;
      display:flex; align-items:center; gap:14px;
    }
    body.dark .channel-card { background:rgba(255,255,255,0.07); border-color:rgba(255,255,255,0.1); }
    .channel-card:active { transform:scale(0.98); }

    .channel-avatar {
      width:54px; height:54px; border-radius:16px;
      display:flex; align-items:center; justify-content:center;
      font-size:22px; font-weight:700; color:white; flex-shrink:0;
      border:2px solid rgba(255,255,255,0.3);
    }
    .channel-info { flex:1; min-width:0; }
    .channel-name { font-size:15px; font-weight:700; color:#1a1a1a; margin-bottom:3px; display:flex; align-items:center; gap:6px; }
    body.dark .channel-name { color:white; }
    .channel-subs { font-size:12px; color:var(--orange); font-weight:600; margin-bottom:3px; }
    .channel-preview { font-size:12px; color:#999; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    body.dark .channel-preview { color:rgba(255,255,255,0.4); }
    .channel-meta { display:flex; flex-direction:column; align-items:flex-end; gap:6px; flex-shrink:0; }
    .channel-time { font-size:12px; color:#aaa; }
    body.dark .channel-time { color:rgba(255,255,255,0.3); }
    .badge { min-width:20px; height:20px; border-radius:10px; background:var(--orange); color:white; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; padding:0 6px; }

    .verified-small { width:16px; height:16px; border-radius:50%; background:white; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; }
    .verified-small svg { width:10px; height:10px; }

    .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 32px; text-align:center; }
    .empty-emoji { font-size:64px; margin-bottom:16px; opacity:0.7; }
    .empty-title { font-family:'Noto Serif JP',serif; font-size:18px; font-weight:700; color:#1a1a1a; margin-bottom:8px; }
    body.dark .empty-title { color:white; }
    .empty-sub { font-size:13px; color:#999; line-height:1.6; }

    .modal-overlay { position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.5); backdrop-filter:blur(8px); display:none; align-items:flex-end; }
    .modal-overlay.show { display:flex; }
    .modal { width:100%; background:rgba(255,255,255,0.97); backdrop-filter:blur(30px); border-radius:24px 24px 0 0; padding:24px 20px 44px; animation:slideUp 0.35s ease; }
    body.dark .modal { background:rgba(18,18,18,0.98); }
    @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
    .modal-handle { width:36px; height:4px; border-radius:2px; background:#ddd; margin:0 auto 20px; }
    body.dark .modal-handle { background:#444; }
    .modal-title { font-family:'Noto Serif JP',serif; font-size:18px; font-weight:700; color:#1a1a1a; margin-bottom:20px; }
    body.dark .modal-title { color:white; }
    .modal-input { width:100%; padding:14px 16px; border-radius:14px; margin-bottom:12px; border:1px solid rgba(0,0,0,0.1); background:rgba(255,255,255,0.8); font-family:'Montserrat',sans-serif; font-size:14px; color:#1a1a1a; outline:none; }
    body.dark .modal-input { background:rgba(255,255,255,0.08); border-color:rgba(255,255,255,0.12); color:white; }
    .modal-input:focus { border-color:var(--orange); }
    .modal-save { width:100%; padding:15px; border-radius:14px; border:none; background:var(--orange); color:white; font-family:'Montserrat',sans-serif; font-size:15px; font-weight:700; cursor:pointer; margin-top:4px; transition:all 0.2s; }
    .modal-save:active { background:var(--orange-light); transform:scale(0.98); }

    .bottom-nav { position:fixed; bottom:0; left:0; right:0; height:var(--nav-height); display:flex; align-items:center; justify-content:space-around; background:rgba(255,255,255,0.6); border-top:1px solid rgba(255,255,255,0.7); backdrop-filter:blur(20px); z-index:10; padding-bottom:8px; }
    body.dark .bottom-nav { background:rgba(10,10,10,0.75); border-top-color:rgba(255,255,255,0.1); }
    .nav-item { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; padding:6px 16px; border-radius:14px; transition:all 0.2s; flex:1; }
    .nav-item:active { transform:scale(0.92); }
    .nav-icon { font-size:22px; transition:transform 0.2s; }
    .nav-label { font-size:10px; font-weight:600; color:#aaa; letter-spacing:0.5px; }
    .nav-item.active .nav-label { color:var(--orange); }
    .nav-item.active .nav-icon { transform:scale(1.15); }
  </style>
</head>
<body class="light">
  <div class="bg-image"></div>
  <div class="bg-overlay"></div>

  <div class="app">
    <div class="header">
      <div class="header-title">Каналы 📢</div>
      <button class="new-btn" onclick="openCreate()">+ Создать канал</button>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab(0)">Мои каналы</div>
      <div class="tab" onclick="switchTab(1)">Популярные</div>
    </div>

    <div class="content">
      <div style="padding:8px 16px 4px; font-size:11px; font-weight:700; color:var(--orange); letter-spacing:1.5px; text-transform:uppercase;">Официальные</div>

      <div class="channel-card">
        <div class="channel-avatar" style="background:linear-gradient(135deg,#FF6B00,#ff3d00)">
          <img src="https://KeyjiCompany.github.io/keyji/logo.jpg" style="width:100%;height:100%;object-fit:cover;border-radius:14px;">
        </div>
        <div class="channel-info">
          <div class="channel-name">
            Keyji Official
            <span class="verified-small"><svg viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="5" fill="#FF6B00"/><path d="M2.5 5l1.5 1.5 3-3" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          </div>
          <div class="channel-subs">1 подписчик</div>
          <div class="channel-preview">Добро пожаловать в Keyji! 🏮</div>
        </div>
        <div class="channel-meta">
          <div class="channel-time">Сейчас</div>
          <div class="badge">1</div>
        </div>
      </div>

      <div style="padding:12px 16px 4px; font-size:11px; font-weight:700; color:var(--orange); letter-spacing:1.5px; text-transform:uppercase;">Мои каналы</div>

      <div class="empty-state">
        <div class="empty-emoji">📢</div>
        <div class="empty-title">Нет каналов</div>
        <div class="empty-sub">Создай канал и делись<br>новостями со своей аудиторией</div>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" onclick="location.href='chats.html'"><div class="nav-icon">💬</div><div class="nav-label">Чаты</div></div>
    <div class="nav-item" onclick="location.href='bots.html'"><div class="nav-icon">🤖</div><div class="nav-label">Боты</div></div>
    <div class="nav-item active"><div class="nav-icon">📢</div><div class="nav-label">Каналы</div></div>
    <div class="nav-item" onclick="location.href='groups.html'"><div class="nav-icon">👥</div><div class="nav-label">Группы</div></div>
  </div>

  <div class="modal-overlay" id="createModal" onclick="closeModal(event)">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">Создать канал 📢</div>
      <input class="modal-input" type="text" placeholder="Название канала">
      <input class="modal-input" type="text" placeholder="@username_канала">
      <textarea class="modal-input" rows="3" placeholder="Описание..."></textarea>
      <button class="modal-save" onclick="closeModal2()">Создать</button>
    </div>
  </div>

  <script>
    function switchTab(i) { document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',i===j)); }
    function openCreate() { document.getElementById('createModal').classList.add('show'); }
    function closeModal(e) { if(e.target.classList.contains('modal-overlay')) e.target.classList.remove('show'); }
    function closeModal2() { document.getElementById('createModal').classList.remove('show'); }
  </script>

<script type="module" src="firebase.js"></script>

</body>
</html>
