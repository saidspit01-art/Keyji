<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>Keyji — Каналы</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{--orange:#FF6B00;--nav:72px}
    body{font-family:'Montserrat',sans-serif;overflow:hidden;height:100vh;background:#f5f0eb}
    body.dark{background:#0a0a0a}
    .bg{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center}
    body.light .bg{background-image:url('https://i.ibb.co/zTS53bWc/file-000000004b807246a5c9c164255caecf.jpg')}
    body.dark .bg{background-image:url('https://i.ibb.co/Pv1Y3F9T/file-0000000062f47246b948af6a043288a5.jpg')}
    body.light .bgo{background:rgba(255,255,255,.2)}
    body.dark .bgo{background:rgba(0,0,0,.4)}
    .bgo{position:fixed;inset:0;z-index:1}
    .app{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column}
    .header{display:flex;align-items:center;justify-content:space-between;padding:52px 16px 14px;background:rgba(255,255,255,.45);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.6)}
    body.dark .header{background:rgba(0,0,0,.5);border-bottom-color:rgba(255,255,255,.08)}
    .htitle{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:700;color:#1a1a1a}
    body.dark .htitle{color:white}
    .nbtn{padding:8px 16px;border-radius:12px;border:none;background:var(--orange);color:white;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.2s;box-shadow:0 4px 12px rgba(255,107,0,.3)}
    .tabs{display:flex;padding:12px 16px;background:rgba(255,255,255,.3);backdrop-filter:blur(10px);gap:8px}
    body.dark .tabs{background:rgba(0,0,0,.3)}
    .tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;color:#999;cursor:pointer;border-radius:12px;transition:.2s}
    .tab.active{background:var(--orange);color:white}
    .content{flex:1;overflow-y:auto;padding:8px 0 calc(var(--nav)+16px)}
    .content::-webkit-scrollbar{display:none}
    .slbl{padding:8px 16px 4px;font-size:11px;font-weight:700;color:var(--orange);letter-spacing:1.5px;text-transform:uppercase}
    .cc{margin:4px 12px;padding:14px 16px;border-radius:18px;background:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.7);backdrop-filter:blur(12px);cursor:pointer;transition:.2s;display:flex;align-items:center;gap:14px}
    body.dark .cc{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.1)}
    .cc:active{transform:scale(.98)}
    .cav{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:white;flex-shrink:0;border:2px solid rgba(255,255,255,.3);overflow:hidden}
    .cav img{width:100%;height:100%;object-fit:cover;border-radius:14px}
    .cinfo{flex:1;min-width:0}
    .cname{font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:3px;display:flex;align-items:center;gap:6px}
    body.dark .cname{color:white}
    .csubs{font-size:12px;color:var(--orange);font-weight:600;margin-bottom:3px}
    .cprev{font-size:12px;color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    body.dark .cprev{color:rgba(255,255,255,.4)}
    .cmeta{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
    .ctime{font-size:12px;color:#aaa}
    .badge{min-width:20px;height:20px;border-radius:10px;background:var(--orange);color:white;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 6px}
    .vbadge{width:16px;height:16px;border-radius:50%;background:white;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
    .vbadge svg{width:10px;height:10px}
    .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;text-align:center}
    .empty-icon{font-size:48px;margin-bottom:12px;opacity:.7}
    .empty-title{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:6px}
    body.dark .empty-title{color:white}
    .empty-sub{font-size:12px;color:#999;line-height:1.6}
    .modal-ov{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);display:none;align-items:flex-end}
    .modal-ov.show{display:flex}
    .modal{width:100%;background:rgba(255,255,255,.97);backdrop-filter:blur(30px);border-radius:24px 24px 0 0;padding:24px 20px 44px;animation:su .35s ease}
    body.dark .modal{background:rgba(18,18,18,.98)}
    @keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .mhandle{width:36px;height:4px;border-radius:2px;background:#ddd;margin:0 auto 20px}
    .mtitle{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:20px}
    body.dark .mtitle{color:white}
    .minput{width:100%;padding:14px 16px;border-radius:14px;margin-bottom:12px;border:1px solid rgba(0,0,0,.1);background:rgba(255,255,255,.8);font-family:'Montserrat',sans-serif;font-size:14px;color:#1a1a1a;outline:none}
    body.dark .minput{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.12);color:white}
    .msave{width:100%;padding:15px;border-radius:14px;border:none;background:var(--orange);color:white;font-family:'Montserrat',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
    .bnav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);display:flex;align-items:center;justify-content:space-around;background:rgba(255,255,255,.6);border-top:1px solid rgba(255,255,255,.7);backdrop-filter:blur(20px);z-index:10;padding-bottom:8px}
    body.dark .bnav{background:rgba(10,10,10,.75);border-top-color:rgba(255,255,255,.1)}
    .ni{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:6px 16px;border-radius:14px;transition:.2s;flex:1}
    .ni:active{transform:scale(.92)}
    .nicon{font-size:22px;transition:transform .2s}
    .nlabel{font-size:10px;font-weight:600;color:#aaa;letter-spacing:.5px}
    .ni.active .nlabel{color:var(--orange)}
    .ni.active .nicon{transform:scale(1.15)}
  </style>
</head>
<body class="light">
<div class="bg"></div><div class="bgo"></div>
<div class="app">
  <div class="header">
    <div class="htitle">Каналы 📢</div>
    <button class="nbtn" onclick="openCreate()">+ Создать канал</button>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab(0)">Мои каналы</div>
    <div class="tab" onclick="switchTab(1)">Популярные</div>
  </div>
  <div class="content">
    <div class="slbl">Официальные</div>
    <div class="cc">
      <div class="cav" style="background:linear-gradient(135deg,#FF6B00,#ff3d00)"><img src="./logo.png" alt="K"></div>
      <div class="cinfo">
        <div class="cname">Keyji Official <span class="vbadge"><svg viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="5" fill="#FF6B00"/><path d="M2.5 5l1.5 1.5 3-3" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span></div>
        <div class="csubs">1 подписчик</div>
        <div class="cprev">Добро пожаловать в Keyji! 🏮</div>
      </div>
      <div class="cmeta"><div class="ctime">Сейчас</div><div class="badge">1</div></div>
    </div>
    <div class="slbl" style="margin-top:8px">Мои каналы</div>
    <div class="empty"><div class="empty-icon">📢</div><div class="empty-title">Нет каналов</div><div class="empty-sub">Создай канал и делись новостями</div></div>
  </div>
</div>
<div class="bnav">
  <div class="ni" onclick="location.href='./chats.html'"><div class="nicon">💬</div><div class="nlabel">Чаты</div></div>
  <div class="ni" onclick="location.href='./bots.html'"><div class="nicon">🤖</div><div class="nlabel">Боты</div></div>
  <div class="ni active"><div class="nicon">📢</div><div class="nlabel">Каналы</div></div>
  <div class="ni" onclick="location.href='./groups.html'"><div class="nicon">👥</div><div class="nlabel">Группы</div></div>
</div>
<div class="modal-ov" id="createModal" onclick="closeModal(event)">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle">Создать канал 📢</div>
    <input class="minput" type="text" placeholder="Название канала">
    <input class="minput" type="text" placeholder="@username_канала">
    <textarea class="minput" rows="3" placeholder="Описание..."></textarea>
    <button class="msave" onclick="closeM()">Создать</button>
  </div>
</div>
<script>
  const FC={apiKey:"AIzaSyDrWwIDh_Y8Fji0KWiVbR2EcmUHl5c6mHM",authDomain:"keyji-974fb.firebaseapp.com",projectId:"keyji-974fb",storageBucket:"keyji-974fb.firebasestorage.app",messagingSenderId:"442818696289",appId:"1:442818696289:web:5ed15e6e31fb85ef2bc620"};
  if(!firebase.apps.length)firebase.initializeApp(FC);
  const auth=firebase.auth();
  let isDark=localStorage.getItem('keyji_theme')==='dark';
  if(isDark)document.body.className='dark';
  auth.onAuthStateChanged(u=>{if(!u)window.location.href='./index.html';});
  function switchTab(i){document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',i===j));}
  function openCreate(){document.getElementById('createModal').classList.add('show');}
  function closeModal(e){if(e.target.classList.contains('modal-ov'))e.target.classList.remove('show');}
  function closeM(){document.getElementById('createModal').classList.remove('show');}
</script>
</body>
</html>
