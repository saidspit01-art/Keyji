<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Keyji — Чат</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--o:#FF6B00}
body{font-family:'Montserrat',sans-serif;overflow:hidden;height:100vh}
body.light{background:#f5f0eb}body.dark{background:#0a0a0a}
.bg{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center}
body.light .bg{background-image:url('https://i.ibb.co/zTS53bWc/file-000000004b807246a5c9c164255caecf.jpg')}
body.dark .bg{background-image:url('https://i.ibb.co/Pv1Y3F9T/file-0000000062f47246b948af6a043288a5.jpg')}
body.light .bgo{background:rgba(255,255,255,.2)}
body.dark .bgo{background:rgba(0,0,0,.42)}
.bgo{position:fixed;inset:0;z-index:1}
.app{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column}
.hdr{display:flex;align-items:center;gap:11px;padding:50px 14px 12px;background:rgba(255,255,255,.5);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.6)}
body.dark .hdr{background:rgba(0,0,0,.55);border-bottom-color:rgba(255,255,255,.08)}
.back{width:38px;height:38px;border-radius:12px;border:1px solid rgba(255,255,255,.5);background:rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;color:#333;flex-shrink:0;transition:.2s}
body.dark .back{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15);color:white}
.back:active{transform:scale(.92)}
.hav{width:40px;height:40px;border-radius:13px;background:linear-gradient(135deg,var(--o),#ff3d00);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:white;flex-shrink:0;overflow:hidden}
.hav img{width:100%;height:100%;object-fit:cover}
.hinfo{flex:1;min-width:0}
.hname{font-size:16px;font-weight:700;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
body.dark .hname{color:white}
.hstat{font-size:12px;color:var(--o);font-weight:500;margin-top:1px}
.hacts{display:flex;gap:7px;flex-shrink:0}
.abt{width:36px;height:36px;border-radius:11px;border:1px solid rgba(255,255,255,.5);background:rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:.2s}
body.dark .abt{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15)}
.abt:active{transform:scale(.92)}
.msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:5px}
.msgs::-webkit-scrollbar{display:none}
.mr{display:flex;align-items:flex-end;gap:7px}
.mr.out{flex-direction:row-reverse}
.mav{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--o),#ff3d00);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0;overflow:hidden}
.mav img{width:100%;height:100%;object-fit:cover}
.mb{max-width:74%;padding:10px 13px;border-radius:18px;word-break:break-word;backdrop-filter:blur(12px)}
.mr.in .mb{background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.7);border-bottom-left-radius:5px}
body.dark .mr.in .mb{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.12)}
.mr.out .mb{background:linear-gradient(135deg,var(--o),#e05500);border-bottom-right-radius:5px}
.mt{font-size:14px;line-height:1.5;color:#1a1a1a}
body.dark .mr.in .mt{color:rgba(255,255,255,.9)}
.mr.out .mt{color:white}
.mm{display:flex;align-items:center;gap:4px;margin-top:3px;justify-content:flex-end}
.mtime{font-size:10px;color:rgba(0,0,0,.4)}
body.dark .mr.in .mtime{color:rgba(255,255,255,.3)}
.mr.out .mtime{color:rgba(255,255,255,.6)}
.mstat{font-size:10px;color:rgba(255,255,255,.7);font-weight:600}
.medit{font-size:10px;color:rgba(0,0,0,.3);font-style:italic}
.mr.out .medit{color:rgba(255,255,255,.5)}
.dsep{text-align:center;margin:8px 0;font-size:11px;color:rgba(0,0,0,.3)}
body.dark .dsep{color:rgba(255,255,255,.25)}
.dsep span{background:rgba(255,255,255,.4);backdrop-filter:blur(8px);padding:3px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.5)}
body.dark .dsep span{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.1)}
.reacts{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
.react{background:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.7);border-radius:20px;padding:2px 7px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:2px}
body.dark .react{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.15)}
.react:active{transform:scale(.92)}
.rct{font-size:11px;font-weight:700;color:#555}
body.dark .rct{color:rgba(255,255,255,.6)}
.rprev{border-left:3px solid rgba(0,0,0,.15);padding:3px 8px;margin-bottom:5px;border-radius:0 6px 6px 0;background:rgba(0,0,0,.05)}
.mr.out .rprev{border-left-color:rgba(255,255,255,.4);background:rgba(255,255,255,.15)}
.rpn{font-size:10px;font-weight:700;color:var(--o);margin-bottom:1px}
.rpt{font-size:11px;color:rgba(0,0,0,.5)}
.mr.out .rpt{color:rgba(255,255,255,.7)}
.vcircle{width:160px;height:160px;border-radius:50%;overflow:hidden;border:3px solid rgba(255,255,255,.5)}
.vcircle video,.vcircle img{width:100%;height:100%;object-fit:cover}
.adtag{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:rgba(255,255,255,.7);background:rgba(0,0,0,.3);border-radius:10px;padding:2px 6px;margin-top:3px}
.ia{padding:8px 12px 28px;background:rgba(255,255,255,.55);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.6)}
body.dark .ia{background:rgba(0,0,0,.6);border-top-color:rgba(255,255,255,.08)}
.rbar{display:none;align-items:center;gap:8px;padding:7px 12px;margin-bottom:6px;background:rgba(255,255,255,.4);border-radius:12px;border:1px solid rgba(255,255,255,.5)}
body.dark .rbar{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.1)}
.rbar.show{display:flex}
.rbt{flex:1;font-size:12px;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
body.dark .rbt{color:rgba(255,255,255,.5)}
.irow{display:flex;align-items:flex-end;gap:8px}
.attbtn{width:40px;height:40px;border-radius:12px;border:1px solid rgba(255,255,255,.5);background:rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;font-size:19px;cursor:pointer;flex-shrink:0;transition:.2s}
body.dark .attbtn{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15)}
.attbtn:active{transform:scale(.92)}
.ibox{flex:1;min-height:40px;max-height:120px;padding:10px 13px;border-radius:14px;border:1px solid rgba(255,255,255,.6);background:rgba(255,255,255,.5);backdrop-filter:blur(10px);font-family:'Montserrat',sans-serif;font-size:14px;color:#1a1a1a;outline:none;resize:none;overflow-y:auto}
body.dark .ibox{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.12);color:white}
.ibox::placeholder{color:#aaa}
.ibox:focus{border-color:var(--o)}
.sbtn{width:40px;height:40px;border-radius:12px;border:none;background:var(--o);display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;flex-shrink:0;box-shadow:0 4px 14px rgba(255,107,0,.35);color:white;transition:.2s}
.sbtn:active{transform:scale(.92)}
.ctx{position:fixed;z-index:200;background:rgba(255,255,255,.93);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.8);border-radius:16px;padding:6px 0;box-shadow:0 8px 30px rgba(0,0,0,.15);display:none;min-width:165px}
body.dark .ctx{background:rgba(28,28,28,.96);border-color:rgba(255,255,255,.1)}
.ctx.show{display:block}
.cxi{padding:11px 15px;font-size:14px;font-weight:600;color:#333;cursor:pointer;display:flex;align-items:center;gap:9px;transition:.15s}
body.dark .cxi{color:rgba(255,255,255,.85)}
.cxi:active{background:rgba(255,107,0,.1)}
.cxi.red{color:#e53935}
.adm{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);display:none;align-items:flex-end}
.adm.show{display:flex}
.adc{width:100%;background:rgba(255,255,255,.97);border-radius:24px 24px 0 0;padding:24px 20px 44px;animation:su .35s ease}
body.dark .adc{background:rgba(18,18,18,.98)}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.adh{width:36px;height:4px;border-radius:2px;background:#ddd;margin:0 auto 18px}
.adt{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:14px}
body.dark .adt{color:white}
.adop{padding:13px 15px;border-radius:13px;border:1px solid rgba(0,0,0,.08);margin-bottom:8px;cursor:pointer;font-size:14px;font-weight:600;color:#333;transition:.15s}
body.dark .adop{border-color:rgba(255,255,255,.1);color:rgba(255,255,255,.85)}
.adop:active{background:rgba(255,107,0,.1);color:var(--o)}
.adcancel{width:100%;padding:12px;border-radius:13px;border:1px solid rgba(0,0,0,.1);background:transparent;font-family:'Montserrat',sans-serif;font-size:14px;color:#888;cursor:pointer;margin-top:5px}
@keyframes pf{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
.petal{position:fixed;z-index:9999;pointer-events:none;animation:pf linear forwards}
</style>
</head>
<body class="light">
<div class="bg"></div><div class="bgo"></div>
<div class="app">
  <div class="hdr">
    <div class="back" onclick="go('chats.html')">←</div>
    <div class="hav" id="hav">?</div>
    <div class="hinfo"><div class="hname" id="hname">...</div><div class="hstat" id="hstat">...</div></div>
    <div class="hacts">
      <div class="abt" onclick="startCall('voice')">📞</div>
      <div class="abt" onclick="startCall('video')">📹</div>
      <div class="abt" onclick="showADM()">⏱</div>
    </div>
  </div>
  <div class="msgs" id="msgs"></div>
  <div class="ia">
    <div class="rbar" id="rbar"><span>↩️</span><div class="rbt" id="rbt">Ответ</div><span style="cursor:pointer;color:#aaa;font-size:16px" onclick="closeReply()">✕</span></div>
    <div class="irow">
      <div class="attbtn" onclick="pickFile()">📎</div>
      <textarea class="ibox" id="ibox" placeholder="Сообщение..." rows="1" oninput="ar(this)" onkeydown="onKey(event)"></textarea>
      <button class="sbtn" onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>
<div class="ctx" id="ctx">
  <div class="cxi" onclick="replyCtx()">↩️ Ответить</div>
  <div class="cxi" onclick="editCtx()">✏️ Редактировать</div>
  <div class="cxi" onclick="reactCtx()">😊 Реакция</div>
  <div class="cxi" onclick="fwdCtx()">🔁 Переслать</div>
  <div class="cxi" onclick="adForMsg()">⏱ Автоудаление</div>
  <div class="cxi red" onclick="delCtx(false)">🗑 Удалить у себя</div>
  <div class="cxi red" onclick="delCtx(true)">🗑 Удалить у всех</div>
</div>
<div class="adm" id="adm">
  <div class="adc">
    <div class="adh"></div>
    <div class="adt">⏱ Автоудаление</div>
    <div class="adop" onclick="setAD(30)">🌸 30 секунд</div>
    <div class="adop" onclick="setAD(60)">1 минута</div>
    <div class="adop" onclick="setAD(300)">5 минут</div>
    <div class="adop" onclick="setAD(3600)">1 час</div>
    <div class="adop" onclick="setAD(86400)">24 часа</div>
    <div class="adop" onclick="setAD(0)" style="color:#e53935">Выключить</div>
    <button class="adcancel" onclick="closeADM()">Отмена</button>
  </div>
</div>
<script>
const FC={apiKey:"AIzaSyDrWwIDh_Y8Fji0KWiVbR2EcmUHl5c6mHM",authDomain:"keyji-974fb.firebaseapp.com",projectId:"keyji-974fb",storageBucket:"keyji-974fb.firebasestorage.app",messagingSenderId:"442818696289",appId:"1:442818696289:web:5ed15e6e31fb85ef2bc620"};
firebase.initializeApp(FC);
const auth=firebase.auth(),db=firebase.firestore();
let me=null,chatId=localStorage.getItem('kcid'),otherUid=localStorage.getItem('kcuid');
let replyId=null,replyTxt='',ctxId=null,ctxOut=false,autoDelSec=0;
let isDark=localStorage.getItem('keyji_theme')==='dark';
if(isDark)document.body.className='dark';else document.body.className='light';

auth.onAuthStateChanged(async u=>{
  if(!u){go('index.html');return;}
  me=u;
  if(otherUid){
    const ud=await db.collection('users').doc(otherUid).get();
    if(ud.exists){
      const d=ud.data();
      const hav=document.getElementById('hav');
      if(d.avatar)hav.innerHTML=`<img src="${d.avatar}">`;else hav.textContent=(d.name||'?')[0].toUpperCase();
      document.getElementById('hname').textContent=d.name||'';
      document.getElementById('hstat').textContent=d.online?'В сети':'Был(а) недавно';
      db.collection('users').doc(otherUid).onSnapshot(s=>{const sd=s.data();if(sd)document.getElementById('hstat').textContent=sd.online?'В сети':'Был(а) недавно';});
    }
  }
  if(chatId)loadMsgs();
});

function loadMsgs(){
  db.collection('chats').doc(chatId).collection('messages').orderBy('timestamp','asc').onSnapshot(snap=>{
    const div=document.getElementById('msgs');
    div.innerHTML='';
    let lastDate='';
    snap.forEach(d=>{
      const m={id:d.id,...d.data()};
      if(m.deletedFor===me.uid)return;
      if(m.timestamp){
        const dt=new Date(m.timestamp.toDate()).toLocaleDateString('ru',{day:'numeric',month:'long'});
        if(dt!==lastDate){lastDate=dt;const sep=document.createElement('div');sep.className='dsep';sep.innerHTML=`<span>${dt}</span>`;div.appendChild(sep);}
      }
      renderMsg(m,div);
      if(m.autoDeleteAt&&m.type!=='deleted'){
        const at=m.autoDeleteAt.toDate?m.autoDeleteAt.toDate():new Date(m.autoDeleteAt);
        const left=at-Date.now();
        if(left<=0)delMsg_(m.id);
        else setTimeout(()=>{delMsg_(m.id);spawnPetals();},left);
      }
    });
    div.scrollTop=div.scrollHeight;
    if(chatId&&otherUid){
      db.collection('chats').doc(chatId).collection('messages').where('senderId','==',otherUid).where('status','!=','read').get().then(s=>s.forEach(d=>d.ref.update({status:'read'})));
    }
  });
}

function renderMsg(m,div){
  const isOut=m.senderId===me.uid;
  const row=document.createElement('div');
  row.className='mr '+(isOut?'out':'in');
  row.dataset.id=m.id;
  const t=m.timestamp?new Date(m.timestamp.toDate()).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}):'';
  let c='';
  if(m.replyTo)c+=`<div class="rprev"><div class="rpn">Ответ</div><div class="rpt">${esc(m.replyTo)}</div></div>`;
  if(m.type==='deleted')c+=`<div class="mt" style="opacity:.5;font-style:italic">🗑 Удалено</div>`;
  else if(m.type==='image')c+=`<img src="${m.fileUrl}" style="max-width:100%;border-radius:12px;cursor:pointer;display:block" onclick="window.open('${m.fileUrl}')">`;
  else if(m.type==='video_circle')c+=`<div class="vcircle"><video src="${m.fileUrl}" controls playsinline></video></div>`;
  else c+=`<div class="mt">${esc(m.text||'')}</div>`;
  c+=`<div class="mm"><span class="mtime">${t}</span>`;
  if(isOut)c+=`<span class="mstat">${m.status==='read'?'Прочитано':m.status==='delivered'?'Доставлено':'Отправлено'}</span>`;
  if(m.edited)c+=`<span class="medit"> изм.</span>`;
  c+=`</div>`;
  if(m.reactions&&Object.keys(m.reactions).length){c+='<div class="reacts">';Object.entries(m.reactions).forEach(([e,n])=>{c+=`<div class="react" onclick="addReact('${m.id}','${e}')">${e}<span class="rct">${n}</span></div>`;});c+='</div>';}
  if(m.autoDeleteAt&&m.type!=='deleted'){const at=m.autoDeleteAt.toDate?m.autoDeleteAt.toDate():new Date(m.autoDeleteAt);const s=Math.max(0,Math.floor((at-Date.now())/1000));c+=`<div class="adtag">⏱ ${s}с</div>`;}
  const avHtml=`<div class="mav">${me.photoURL?`<img src="${me.photoURL}">`:(me.displayName||'?')[0].toUpperCase()}</div>`;
  if(!isOut)row.innerHTML=`${avHtml}<div><div class="mb">${c}</div></div>`;
  else row.innerHTML=`<div><div class="mb">${c}</div></div>`;
  div.appendChild(row);
  const mb=row.querySelector('.mb');
  if(mb){let pt;mb.addEventListener('touchstart',e=>{pt=setTimeout(()=>showCtx(e.touches[0].clientX,e.touches[0].clientY,m.id,isOut),500);});mb.addEventListener('touchend',()=>clearTimeout(pt));mb.addEventListener('contextmenu',e=>{e.preventDefault();showCtx(e.clientX,e.clientY,m.id,isOut);});}
}

async function sendMsg(){
  const box=document.getElementById('ibox');const txt=box.value.trim();
  if(!txt||!chatId)return;
  box.value='';box.style.height='auto';
  const data={senderId:me.uid,text:txt,type:'text',timestamp:firebase.firestore.FieldValue.serverTimestamp(),status:'sent',edited:false,reactions:{},replyTo:replyId?replyTxt:null,autoDeleteAt:autoDelSec?new Date(Date.now()+autoDelSec*1000):null};
  closeReply();
  const ref=await db.collection('chats').doc(chatId).collection('messages').add(data);
  await db.collection('chats').doc(chatId).update({lastMessage:txt,lastMessageTime:firebase.firestore.FieldValue.serverTimestamp(),lastSenderId:me.uid});
  setTimeout(()=>ref.update({status:'delivered'}),1200);
}

function ar(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
function closeReply(){document.getElementById('rbar').classList.remove('show');replyId=null;replyTxt='';}

function showCtx(x,y,mid,isOut){
  ctxId=mid;ctxOut=isOut;
  const m=document.getElementById('ctx');
  m.style.left=Math.min(x,window.innerWidth-175)+'px';
  m.style.top=Math.max(y-215,55)+'px';
  m.classList.add('show');
  setTimeout(()=>document.addEventListener('touchstart',hideCtxOut,{once:true}),100);
}
function hideCtxOut(e){if(!document.getElementById('ctx').contains(e.target))document.getElementById('ctx').classList.remove('show');}
function closeCtx(){document.getElementById('ctx').classList.remove('show');}

function replyCtx(){
  const el=document.querySelector(`[data-id="${ctxId}"] .mt`);
  if(el){replyId=ctxId;replyTxt=el.textContent;document.getElementById('rbar').classList.add('show');document.getElementById('rbt').textContent=el.textContent;document.getElementById('ibox').focus();}
  closeCtx();
}
async function editCtx(){
  if(!ctxOut){closeCtx();return;}
  const el=document.querySelector(`[data-id="${ctxId}"] .mt`);
  if(!el){closeCtx();return;}
  const nt=prompt('Редактировать:',el.textContent);
  if(nt&&nt.trim())await db.collection('chats').doc(chatId).collection('messages').doc(ctxId).update({text:nt.trim(),edited:true});
  closeCtx();
}
async function reactCtx(){
  const emojis=['❤️','🔥','😂','👍','🌸','✨','😮','😢'];
  const e=emojis[Math.floor(Math.random()*emojis.length)];
  await addReact(ctxId,e);closeCtx();
}
async function addReact(mid,emoji){
  const ref=db.collection('chats').doc(chatId).collection('messages').doc(mid);
  const d=await ref.get();if(!d.exists)return;
  const r=d.data().reactions||{};r[emoji]=(r[emoji]||0)+1;
  await ref.update({reactions:r});
}
function fwdCtx(){alert('Пересылка скоро будет');closeCtx();}
function adForMsg(){closeCtx();showADM();}
async function delCtx(all){
  if(all)await db.collection('chats').doc(chatId).collection('messages').doc(ctxId).update({text:'',type:'deleted',fileUrl:''});
  else await db.collection('chats').doc(chatId).collection('messages').doc(ctxId).update({deletedFor:me.uid});
  closeCtx();
}
async function delMsg_(mid){await db.collection('chats').doc(chatId).collection('messages').doc(mid).update({text:'',type:'deleted',fileUrl:''});}

function showADM(){document.getElementById('adm').classList.add('show');}
function setAD(s){autoDelSec=s;closeADM();}
function closeADM(){document.getElementById('adm').classList.remove('show');}

function pickFile(){
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*,video/*';
  inp.onchange=async e=>{
    const file=e.target.files[0];if(!file)return;
    if(file.size>3*1024*1024){alert('Файл не более 3МБ');return;}
    const reader=new FileReader();
    reader.onload=async ev=>{
      const type=file.type.startsWith('video')?'video_circle':'image';
      await db.collection('chats').doc(chatId).collection('messages').add({senderId:me.uid,text:'',type,fileUrl:ev.target.result,timestamp:firebase.firestore.FieldValue.serverTimestamp(),status:'sent',edited:false,reactions:{},replyTo:null,autoDeleteAt:autoDelSec?new Date(Date.now()+autoDelSec*1000):null});
      await db.collection('chats').doc(chatId).update({lastMessage:'📎 Файл',lastMessageTime:firebase.firestore.FieldValue.serverTimestamp()});
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

function startCall(t){alert(t==='voice'?'📞 Голосовой звонок...':'📹 Видеозвонок...');}

function spawnPetals(){
  for(let i=0;i<20;i++){setTimeout(()=>{const p=document.createElement('div');p.className='petal';p.textContent=['🌸','🌺','🍃','✨'][Math.floor(Math.random()*4)];p.style.cssText=`left:${Math.random()*100}vw;top:-30px;font-size:${12+Math.random()*14}px;animation-duration:${2+Math.random()*3}s`;document.body.appendChild(p);setTimeout(()=>p.remove(),5000);},i*100);}
}
function go(p){location.href='./'+p;}
function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
