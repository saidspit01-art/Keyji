<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Keyji</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --orange: #FF6B00;
      --orange-light: #FF8C38;
      --glass: rgba(255,255,255,0.08);
      --glass-border: rgba(255,255,255,0.15);
    }
    body { font-family: 'Montserrat', sans-serif; min-height: 100vh; overflow: hidden; background: #0a0a0a; }

    /* SPLASH */
    #splash {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      z-index: 100; background: #0a0a0a; transition: opacity 0.8s ease, transform 0.8s ease;
    }
    #splash.hide { opacity: 0; transform: scale(1.05); pointer-events: none; }
    .splash-logo { width: 120px; height: 120px; border-radius: 28px; animation: splashPulse 1.5s ease-in-out infinite alternate; }
    @keyframes splashPulse {
      from { transform: scale(0.95); opacity: 0.8; }
      to { transform: scale(1.05); opacity: 1; }
    }

    /* LOGIN */
    #login-screen { position: fixed; inset: 0; display: flex; flex-direction: column; opacity: 0; transition: opacity 0.8s ease; }
    #login-screen.show { opacity: 1; }
    .bg-image {
      position: absolute; inset: 0;
      background-image: url('https://i.ibb.co/Pv1Y3F9T/file-0000000062f47246b948af6a043288a5.jpg');
      background-size: cover; background-position: center; z-index: 0;
    }
    .bg-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.1) 40%, rgba(0,0,0,0.7) 75%, rgba(0,0,0,0.92) 100%);
      z-index: 1;
    }
    .login-content { position: relative; z-index: 2; display: flex; flex-direction: column; height: 100%; padding: 0 28px; }
    .top-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-top: 60px; }
    .app-logo { width: 90px; height: 90px; border-radius: 22px; margin-bottom: 16px; animation: fadeDown 1s ease 0.3s both; }
    .app-name { font-family: 'Noto Serif JP', serif; font-size: 36px; font-weight: 700; color: white; letter-spacing: 4px; animation: fadeDown 1s ease 0.5s both; }
    .app-tagline { font-size: 13px; color: rgba(255,255,255,0.5); letter-spacing: 2px; margin-top: 8px; font-weight: 300; animation: fadeDown 1s ease 0.7s both; }
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    .bottom-area { padding-bottom: 50px; animation: fadeUp 1s ease 0.9s both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

    .lang-btn {
      width: 100%; padding: 16px; border-radius: 16px; border: 1px solid var(--glass-border);
      background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      color: white; font-family: 'Montserrat', sans-serif; font-size: 15px; font-weight: 600;
      letter-spacing: 1px; cursor: pointer; transition: all 0.3s ease; margin-bottom: 12px;
    }
    .lang-btn.primary { background: var(--orange); border-color: var(--orange); }
    .lang-btn.primary:active { background: var(--orange-light); transform: scale(0.98); }
    .lang-btn.secondary:active { background: rgba(255,255,255,0.15); transform: scale(0.98); }
    .lang-divider { text-align: center; color: rgba(255,255,255,0.3); font-size: 12px; margin: 4px 0 12px; letter-spacing: 1px; }

    /* AUTH */
    #auth-screen { position: fixed; inset: 0; display: none; flex-direction: column; opacity: 0; transition: opacity 0.5s ease; overflow-y: auto; }
    #auth-screen.show { opacity: 1; }
    .auth-bg {
      position: fixed; inset: 0;
      background-image: url('https://i.ibb.co/Pv1Y3F9T/file-0000000062f47246b948af6a043288a5.jpg');
      background-size: cover; background-position: center; z-index: 0;
    }
    .auth-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); z-index: 1; }
    .auth-content { position: relative; z-index: 2; display: flex; flex-direction: column; min-height: 100%; padding: 0 28px 40px; }
    .auth-header { display: flex; align-items: center; padding-top: 56px; margin-bottom: 40px; }
    .back-btn {
      width: 40px; height: 40px; border-radius: 12px; border: 1px solid var(--glass-border);
      background: var(--glass); backdrop-filter: blur(10px); color: white; font-size: 18px;
      cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease;
    }
    .back-btn:active { transform: scale(0.92); }
    .auth-title { font-family: 'Noto Serif JP', serif; font-size: 24px; color: white; margin-left: 16px; font-weight: 700; }

    .auth-tabs {
      display: flex; background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 14px; padding: 4px; margin-bottom: 32px; backdrop-filter: blur(10px);
    }
    .tab-btn {
      flex: 1; padding: 10px; border-radius: 10px; border: none; background: transparent;
      color: rgba(255,255,255,0.5); font-family: 'Montserrat', sans-serif; font-size: 14px;
      font-weight: 600; cursor: pointer; transition: all 0.3s ease;
    }
    .tab-btn.active { background: var(--orange); color: white; }

    .auth-form { display: flex; flex-direction: column; gap: 14px; }
    .input-label { display: block; font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; font-weight: 600; }
    .auth-input {
      width: 100%; padding: 14px 18px; border-radius: 14px; border: 1px solid var(--glass-border);
      background: var(--glass); backdrop-filter: blur(10px); color: white;
      font-family: 'Montserrat', sans-serif; font-size: 15px; outline: none; transition: all 0.3s ease;
    }
    .auth-input::placeholder { color: rgba(255,255,255,0.25); }
    .auth-input:focus { border-color: var(--orange); background: rgba(255,107,0,0.08); }
    .auth-submit {
      width: 100%; padding: 16px; border-radius: 16px; border: none; background: var(--orange);
      color: white; font-family: 'Montserrat', sans-serif; font-size: 15px; font-weight: 700;
      letter-spacing: 1px; cursor: pointer; margin-top: 8px; transition: all 0.3s ease;
    }
    .auth-submit:active { transform: scale(0.97); background: var(--orange-light); }
    .google-btn {
      width: 100%; padding: 14px; border-radius: 16px; border: 1px solid var(--glass-border);
      background: var(--glass); backdrop-filter: blur(10px); color: white;
      font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.3s ease;
    }
    .google-btn:active { background: rgba(255,255,255,0.15); transform: scale(0.97); }
    .divider { display: flex; align-items: center; gap: 12px; margin: 4px 0; }
    .divider-line { flex: 1; height: 1px; background: var(--glass-border); }
    .divider-text { font-size: 12px; color: rgba(255,255,255,0.3); font-weight: 600; }
    #register-fields { display: none; }
    #register-fields.show { display: contents; }
    .terms { text-align: center; font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 16px; line-height: 1.6; }
    .terms span { color: var(--orange); cursor: pointer; }
  </style>
</head>
<body>

  <div id="splash">
    <img class="splash-logo" src="https://i.ibb.co/GQ3T21qm/file-00000000ea2472469cbca4c0cbe8b34e.jpg" alt="Keyji">
  </div>

  <div id="login-screen">
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>
    <div class="login-content">
      <div class="top-area">
        <img class="app-logo" src="https://i.ibb.co/GQ3T21qm/file-00000000ea2472469cbca4c0cbe8b34e.jpg" alt="Keyji">
        <div class="app-name">Keyji</div>
        <div class="app-tagline">MESSENGER</div>
      </div>
      <div class="bottom-area">
        <button class="lang-btn primary" onclick="openAuth('ru')">Продолжить на русском</button>
        <div class="lang-divider">или</div>
        <button class="lang-btn secondary" onclick="openAuth('en')">Continue in English</button>
      </div>
    </div>
  </div>

  <div id="auth-screen">
    <div class="auth-bg"></div>
    <div class="auth-overlay"></div>
    <div class="auth-content">
      <div class="auth-header">
        <button class="back-btn" onclick="closeAuth()">←</button>
        <div class="auth-title" id="auth-title">Войти</div>
      </div>
      <div class="auth-tabs">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Войти</button>
        <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Регистрация</button>
      </div>
      <div class="auth-form">
        <div id="register-fields">
          <div class="input-group" style="margin-bottom:14px">
            <label class="input-label" id="lbl-name">Имя</label>
            <input class="auth-input" type="text" id="inp-name" placeholder="Ваше имя">
          </div>
          <div class="input-group" style="margin-bottom:14px">
            <label class="input-label">Юзернейм</label>
            <input class="auth-input" type="text" placeholder="@username">
          </div>
        </div>
        <div class="input-group">
          <label class="input-label">Email</label>
          <input class="auth-input" type="email" placeholder="example@email.com">
        </div>
        <div class="input-group">
          <label class="input-label" id="lbl-pass">Пароль</label>
          <input class="auth-input" type="password" placeholder="••••••••">
        </div>
        <button class="auth-submit" id="submit-btn">Войти</button>
        <div class="divider">
          <div class="divider-line"></div>
          <div class="divider-text" id="or-text">ИЛИ</div>
          <div class="divider-line"></div>
        </div>
        <button class="google-btn">
          <svg width="18" height="18" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Google
        </button>
      </div>
      <div class="terms" id="terms-text">
        Продолжая, вы соглашаетесь с <span>Условиями использования</span><br>и <span>Политикой конфиденциальности</span>
      </div>
    </div>
  </div>

  <script>
    let currentLang = 'ru';
    const L = {
      ru: { login:'Войти', register:'Регистрация', submitLogin:'Войти', submitRegister:'Создать аккаунт', or:'ИЛИ', terms:'Продолжая, вы соглашаетесь с <span>Условиями использования</span><br>и <span>Политикой конфиденциальности</span>' },
      en: { login:'Sign In', register:'Sign Up', submitLogin:'Sign In', submitRegister:'Create Account', or:'OR', terms:'By continuing, you agree to our <span>Terms of Service</span><br>and <span>Privacy Policy</span>' }
    };

    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('splash').classList.add('hide');
        setTimeout(() => document.getElementById('login-screen').classList.add('show'), 400);
      }, 1800);
    });

    function openAuth(lang) {
      currentLang = lang;
      const s = document.getElementById('auth-screen');
      s.style.display = 'flex';
      setTimeout(() => s.classList.add('show'), 10);
      switchTab('login');
      applyLang();
    }

    function closeAuth() {
      const s = document.getElementById('auth-screen');
      s.classList.remove('show');
      setTimeout(() => s.style.display = 'none', 500);
    }

    function switchTab(tab) {
      const l = L[currentLang];
      const isLogin = tab === 'login';
      document.getElementById('tab-login').classList.toggle('active', isLogin);
      document.getElementById('tab-register').classList.toggle('active', !isLogin);
      document.getElementById('register-fields').classList.toggle('show', !isLogin);
      document.getElementById('submit-btn').textContent = isLogin ? l.submitLogin : l.submitRegister;
      document.getElementById('auth-title').textContent = isLogin ? l.login : l.register;
    }

    function applyLang() {
      const l = L[currentLang];
      document.getElementById('tab-login').textContent = l.login;
      document.getElementById('tab-register').textContent = l.register;
      document.getElementById('or-text').textContent = l.or;
      document.getElementById('terms-text').innerHTML = l.terms;
      document.getElementById('auth-title').textContent = l.login;
      document.getElementById('submit-btn').textContent = l.submitLogin;
    }
  </script>
</body>
</html>
