<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Keyji</title>
<link rel="manifest" href="./manifest.json"/>
<meta name="theme-color" content="#FF6B00"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Keyji"/>
<link rel="icon" href="./logo.png"/>
<link rel="apple-touch-icon" href="./logo.png"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--o:#FF6B00;--ol:#FF8C38}
body{font-family:'Montserrat',sans-serif;background:#0a0a0a;min-height:100vh;overflow:hidden}
#splash{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0a0a0a;z-index:999;transition:.8s}
#splash.hide{opacity:0;transform:scale(1.05);pointer-events:none}
.sl{width:120px;height:120px;border-radius:28px;object-fit:cover;animation:pu 1.6s infinite alternate}
@keyframes pu{from{transform:scale(.95);opacity:.8}to{transform:scale(1.05);opacity:1}}
#ls{position:fixed;inset:0;opacity:0;transition:1s;pointer-events:none}
#ls.show{opacity:1;pointer-events:all}
.bg{position:absolute;inset:0;background-image:url('https://i.ibb.co/Pv1Y3F9T/file-0000000062f47246b948af6a043288a5.jpg');background-size:cover;background-position:center}
.ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.2),rgba(0,0,0,.1),rgba(0,0,0,.75),rgba(0,0,0,.95))}
.lc{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;justify-content:space-between;padding:60px 28px 50px}
.top{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1}
.logo{width:90px;height:90px;border-radius:22px;object-fit:cover;margin-bottom:16px}
.title{font-family:'Noto Serif JP',serif;color:white;font-size:36px;font-weight:700;letter-spacing:4px}
.sub{color:rgba(255,255,255,.5);font-size:12px;letter-spacing:3px;margin-top:8px}
.bot{width:100%}
.btn{width:100%;border:none;border-radius:18px;padding:17px;cursor:pointer;font-size:15px;font-weight:700;margin-bottom:12px;font-family:'Montserrat',sans-serif;transition:.2s}
.btn:active{transform:scale(.98)}
.bp{background:var(--o);color:white}
.bs{background:rgba(255,255,255,.08);color:white;border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(20px)}
.dv{text-align:center;color:rgba(255,255,255,.3);margin-bottom:12px;font-size:12px}
#auth{position:fixed;inset:0;display:none;z-index:1000;overflow-y:auto}
#auth.show{display:block}
.ao{position:fixed;inset:0;background:rgba(0,0,0,.92);backdrop-filter:blur(12px)}
.ac{position:relative;z-index:2;padding:55px 28px 40px;min-height:100%}
.bk{width:42px;height:42px;border-radius:14px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:white;font-size:20px;cursor:pointer;margin-bottom:28px;display:flex;align-items:center;justify-content:center}
.bk:active{transform:scale(.92)}
.at{color:white;font-size:28px;font-weight:700;margin-bottom:24px;font-family:'Noto Serif JP',serif}
.tabs{display:flex;gap:8px;margin-bottom:24px}
.tab{flex:1;padding:13px;border-radius:14px;border:1px solid rgba(255,255,255,.12);cursor:pointer;font-weight:700;background:rgba(255,255,255,.06);color:rgba(255,255,255,.4);font-family:'Montserrat',sans-serif;font-size:14px;transition:.2s}
.tab.active{background:var(--o);color:white;border-color:var(--o)}
.fld{margin-bottom:14px}
.lbl{display:block;color:rgba(255,255,255,.5);font-size:11px;margin-bottom:7px;letter-spacing:1.5px;text-transform:uppercase}
.inp{width:100%;padding:15px;border-radius:15px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.07);color:white;outline:none;font-size:15px;font-family:'Montserrat',sans-serif;transition:.2s}
.inp::placeholder{color:rgba(255,255,255,.2)}
.inp:focus{border-color:var(--o);background:rgba(255,107,0,.07)}
.sbtn{width:100%;padding:17px;border:none;border-radius:18px;background:var(--o);color:white;font-size:15px;font-weight:700;margin-top:8px;cursor:pointer;font-family:'Montserrat',sans-serif;transition:.2s}
.sbtn:active{transform:scale(.98);background:var(--ol)}
.sbtn:disabled{opacity:.6;cursor:not-allowed}
#rf{display:none}
#rf.show{display:block}
.gbtn{width:100%;padding:14px;border-radius:16px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:white;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:10px;transition:.2s}
.gbtn:active{background:rgba(255,255,255,.12);transform:scale(.97)}
.od{display:flex;align-items:center;gap:10px;margin:12px 0 4px}
.ol2{flex:1;height:1px;background:rgba(255,255,255,.1)}
.ot{font-size:12px;color:rgba(255,255,255,.25);font-weight:600}
.terms{margin-top:16px;text-align:center;color:rgba(255,255,255,.3);font-size:11px;line-height:1.6}
.terms span{color:var(--o)}
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 24px;border-radius:14px;font-size:14px;font-weight:600;white-space:nowrap;opacity:0;transition:.3s;pointer-events:none;max-width:90vw;font-family:'Montserrat',sans-serif}
.toast.show{opacity:1}
.tok{background:#43a047;color:white}
.terr{background:#e53935;color:white}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div id="splash"><img class="sl" src="./logo.png" alt="Keyji"></div>
<div id="ls">
  <div class="bg"></div><div class="ov"></div>
  <div class="lc">
    <div class="top">
      <img class="logo" src="./logo.png" alt="Keyji">
      <div class="title">Keyji</div>
      <div class="sub">MESSENGER</div>
    </div>
    <div class="bot">
      <button class="btn bp" onclick="openAuth('ru')">Продолжить на русском</button>
      <div class="dv">или</div>
      <button class="btn bs" onclick="openAuth('en')">Continue in English</button>
    </div>
  </div>
</div>
<div id="auth">
  <div class="ao"></div>
  <div class="ac">
    <button class="bk" onclick="closeAuth()">←</button>
    <div class="at" id="atitle">Войти</div>
    <div class="tabs">
      <button class="tab active" id="ltab" onclick="switchTab('l')">Войти</button>
      <button class="tab" id="rtab" onclick="switchTab('r')">Регистрация</button>
    </div>
    <div id="rf">
      <div class="fld"><label class="lbl">Имя</label><input class="inp" id="iname" type="text" placeholder="Ваше имя"></div>
      <div class="fld"><label class="lbl">Юзернейм</label><input class="inp" id="iuser" type="text" placeholder="@username"></div>
    </div>
    <div class="fld"><label class="lbl">Email</label><input class="inp" id="iemail" type="email" placeholder="example@email.com"></div>
    <div class="fld"><label class="lbl">Пароль</label><input class="inp" id="ipass" type="password" placeholder="••••••••"></div>
    <button class="sbtn" id="sbtn" onclick="handleSubmit()">Войти</button>
    <div class="od"><div class="ol2"></div><div class="ot">ИЛИ</div><div class="ol2"></div></div>
    <button class="gbtn" onclick="handleGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Google
    </button>
    <div class="terms">Продолжая, вы соглашаетесь с <span>Условиями использования</span><br>и <span>Политикой конфиденциальности</span></div>
  </div>
</div>
<script>
const FC={apiKey:"AIzaSyDrWwIDh_Y8Fji0KWiVbR2EcmUHl5c6mHM",authDomain:"keyji-974fb.firebaseapp.com",projectId:"keyji-974fb",storageBucket:"keyji-974fb.firebasestorage.app",messagingSenderId:"442818696289",appId:"1:442818696289:web:5ed15e6e31fb85ef2bc620"};
firebase.initializeApp(FC);
const auth=firebase.auth(),db=firebase.firestore();
let isReg=false;

auth.onAuthStateChanged(u=>{
  if(u){location.href=localStorage.getItem('keyji_ob')?'./chats.html':'./onboarding.html';}
});

window.addEventListener('load',()=>{
  setTimeout(()=>{
    document.getElementById('splash').classList.add('hide');
    setTimeout(()=>document.getElementById('ls').classList.add('show'),400);
  },1800);
});

function toast(m,c='terr'){const t=document.getElementById('toast');t.textContent=m;t.className='toast show '+c;setTimeout(()=>t.classList.remove('show'),3500);}
function openAuth(l){localStorage.setItem('kl',l);document.getElementById('auth').classList.add('show');switchTab('l');}
function closeAuth(){document.getElementById('auth').classList.remove('show');}
function switchTab(t){
  isReg=t==='r';
  document.getElementById('ltab').classList.toggle('active',!isReg);
  document.getElementById('rtab').classList.toggle('active',isReg);
  document.getElementById('rf').classList.toggle('show',isReg);
  document.getElementById('atitle').textContent=isReg?'Регистрация':'Войти';
  document.getElementById('sbtn').textContent=isReg?'Создать аккаунт':'Войти';
}

async function handleSubmit(){
  const email=document.getElementById('iemail').value.trim();
  const pass=document.getElementById('ipass').value;
  if(!email||!pass){toast('Заполните все поля!');return;}
  const btn=document.getElementById('sbtn');
  btn.disabled=true;btn.textContent='...';
  try{
    if(isReg){
      const name=document.getElementById('iname').value.trim();
      const uname=document.getElementById('iuser').value.trim().replace(/[@\s]/g,'').toLowerCase();
      if(!name||!uname){toast('Введите имя и юзернейм!');btn.disabled=false;btn.textContent='Создать аккаунт';return;}
      if(uname.length<3){toast('Юзернейм минимум 3 символа');btn.disabled=false;btn.textContent='Создать аккаунт';return;}
      if(pass.length<6){toast('Пароль минимум 6 символов');btn.disabled=false;btn.textContent='Создать аккаунт';return;}
      const q=await db.collection('users').where('username','==',uname).get();
      if(!q.empty){toast('Юзернейм уже занят!');btn.disabled=false;btn.textContent='Создать аккаунт';return;}
      const cr=await auth.createUserWithEmailAndPassword(email,pass);
      await cr.user.updateProfile({displayName:name});
      await db.collection('users').doc(cr.user.uid).set({
        uid:cr.user.uid,name,username:uname,email,bio:'',avatar:'',photos:[],phone:'',
        verified:false,frozen:false,hideEmail:false,hideCountry:true,hideOnline:false,
        createdAt:firebase.firestore.FieldValue.serverTimestamp(),
        lastSeen:firebase.firestore.FieldValue.serverTimestamp(),
        online:true,lang:localStorage.getItem('kl')||'ru',
        settings:{notif:true,sound:true,vibro:true,preview:true}
      });
      toast('Добро пожаловать! 🌸','tok');
    }else{
      await auth.signInWithEmailAndPassword(email,pass);
      toast('С возвращением! 🏮','tok');
    }
  }catch(e){
    const m={'auth/email-already-in-use':'Email уже используется','auth/wrong-password':'Неверный пароль','auth/user-not-found':'Пользователь не найден','auth/invalid-credential':'Неверный email или пароль','auth/weak-password':'Слабый пароль','auth/invalid-email':'Неверный email'};
    toast(m[e.code]||e.message);
    btn.disabled=false;btn.textContent=isReg?'Создать аккаунт':'Войти';
  }
}

async function handleGoogle(){
  try{
    const r=await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    const u=r.user;
    const d=await db.collection('users').doc(u.uid).get();
    if(!d.exists){
      await db.collection('users').doc(u.uid).set({
        uid:u.uid,name:u.displayName||'User',
        username:'user'+Math.floor(Math.random()*99999),
        email:u.email,bio:'',avatar:u.photoURL||'',photos:[],phone:'',
        verified:false,frozen:false,hideEmail:false,hideCountry:true,hideOnline:false,
        createdAt:firebase.firestore.FieldValue.serverTimestamp(),
        lastSeen:firebase.firestore.FieldValue.serverTimestamp(),
        online:true,lang:'ru',settings:{notif:true,sound:true,vibro:true,preview:true}
      });
    }
    toast('Добро пожаловать! 🏮','tok');
  }catch(e){toast('Ошибка Google входа');}
}

document.addEventListener('keydown',e=>{if(e.key==='Enter')handleSubmit();});
if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
</html>
