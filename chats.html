<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Keyji — Чаты</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--o:#FF6B00;--nav:72px}
body{font-family:'Montserrat',sans-serif;overflow:hidden;height:100vh}
body.light{background:#f5f0eb}body.dark{background:#0a0a0a}
.bg{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center}
body.light .bg{background-image:url('https://i.ibb.co/zTS53bWc/file-000000004b807246a5c9c164255caecf.jpg')}
body.dark .bg{background-image:url('https://i.ibb.co/Pv1Y3F9T/file-0000000062f47246b948af6a043288a5.jpg')}
body.light .bgo{background:rgba(255,255,255,.15)}
body.dark .bgo{background:rgba(0,0,0,.38)}
.bgo{position:fixed;inset:0;z-index:1}
.app{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:52px 16px 12px;background:rgba(255,255,255,.5);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.6)}
body.dark .hdr{background:rgba(0,0,0,.55);border-bottom-color:rgba(255,255,255,.08)}
.mbtn{width:40px;height:40px;border-radius:12px;border:1px solid rgba(255,255,255,.5);background:rgba(255,255,255,.3);backdrop-filter:blur(10px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;transition:.2s}
body.dark .mbtn{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15)}
.mbtn span{width:18px;height:2px;border-radius:2px;background:#333;transition:.2s}
body.dark .mbtn span{background:white}
.mbtn:active{transform:scale(.92)}
.htitle{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:700;color:#1a1a1a}
body.dark .htitle{color:white}
.ibtn{width:40px;height:40px;border-radius:12px;border:1px solid rgba(255,255,255,.5);background:rgba(255,255,255,.3);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;transition:.2s}
body.dark .ibtn{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15)}
.ibtn:active{transform:scale(.92)}
.sw{padding:8px 14px 6px}
.sb{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:16px;background:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.7);backdrop-filter:blur(10px)}
body.dark .sb{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.12)}
.sb input{flex:1;border:none;background:transparent;font-family:'Montserrat',sans-serif;font-size:14px;color:#333;outline:none}
body.dark .sb input{color:white}
.sb input::placeholder{color:#aaa}
.cl{flex:1;overflow-y:auto;padding:4px 0 calc(var(--nav)+16px)}
.cl::-webkit-scrollbar{display:none}
.ci{display:flex;align-items:center;gap:13px;padding:12px 15px;margin:3px 10px;border-radius:18px;background:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.65);backdrop-filter:blur(12px);cursor:pointer;transition:.2s;position:relative}
body.dark .ci{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.1)}
.ci:active{transform:scale(.98)}
.av{width:52px;height:52px;border-radius:16px;flex-shrink:0;border:2px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:white;overflow:hidden;position:relative}
.av img{width:100%;height:100%;object-fit:cover}
.odot{position:absolute;bottom:1px;right:1px;width:13px;height:13px;border-radius:50%;background:#4CAF50;border:2px solid white}
body.dark .odot{border-color:#1a1a1a}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:15px;font-weight:700;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;display:flex;align-items:center;gap:5px}
body.dark .ci-name{color:white}
.ci-prev{font-size:13px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
body.dark .ci-prev{color:rgba(255,255,255,.4)}
.ci-meta{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.ci-t{font-size:11px;color:#aaa}
body.dark .ci-t{color:rgba(255,255,255,.3)}
.badge{min-width:20px;height:20px;border-radius:10px;background:var(--o);color:white;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 5px}
.vbdg{width:16px;height:16px;border-radius:50%;background:white;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.vbdg svg{width:10px;height:10px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:40px;text-align:center}
.ei{font-size:56px;margin-bottom:14px;opacity:.6}
.et{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:8px}
body.dark .et{color:white}
.es{font-size:13px;color:#999;line-height:1.6}
.fab{position:fixed;bottom:calc(var(--nav)+18px);right:18px;width:52px;height:52px;border-radius:16px;background:var(--o);border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(255,107,0,.4);cursor:pointer;z-index:10;font-size:22px;color:white;transition:.2s}
.fab:active{transform:scale(.92)}
.bnav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);display:flex;align-items:center;background:rgba(255,255,255,.65);border-top:1px solid rgba(255,255,255,.7);backdrop-filter:blur(20px);z-index:10;padding-bottom:8px}
body.dark .bnav{background:rgba(10,10,10,.8);border-top-color:rgba(255,255,255,.1)}
.ni{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;flex:1;padding:6px;transition:.2s}
.ni:active{transform:scale(.92)}
.nicon{font-size:22px;transition:transform .2s}
.nlbl{font-size:10px;font-weight:600;color:#aaa}
.ni.active .nlbl{color:var(--o)}
.ni.active .nicon{transform:scale(1.1)}
/* SIDEBAR */
.sdo{position:fixed;inset:0;z-index:20;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:.3s}
.sdo.show{opacity:1;pointer-events:all}
.sd{position:fixed;top:0;left:-290px;bottom:0;width:280px;z-index:21;transition:left .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;background:rgba(255,255,255,.88);backdrop-filter:blur(30px);border-right:1px solid rgba(255,255,255,.6)}
body.dark .sd{background:rgba(14,14,14,.93);border-right-color:rgba(255,255,255,.08)}
.sd.open{left:0}
.sdh{padding:56px 20px 20px;border-bottom:1px solid rgba(0,0,0,.06)}
body.dark .sdh{border-bottom-color:rgba(255,255,255,.06)}
.sdav{width:62px;height:62px;border-radius:18px;background:linear-gradient(135deg,var(--o),#ff3d00);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:white;margin-bottom:10px;overflow:hidden}
.sdav img{width:100%;height:100%;object-fit:cover}
.sdname{font-size:17px;font-weight:700;color:#1a1a1a;margin-bottom:2px}
body.dark .sdname{color:white}
.sdusr{font-size:13px;color:#888}
body.dark .sdusr{color:rgba(255,255,255,.4)}
.sdm{flex:1;overflow-y:auto;padding:8px 0}
.smi{display:flex;align-items:center;gap:13px;padding:13px 20px;cursor:pointer;transition:.15s}
.smi:active{background:rgba(255,107,0,.08)}
.smic{font-size:20px;width:24px;text-align:center}
.smil{font-size:15px;font-weight:600;color:#333}
body.dark .smil{color:rgba(255,255,255,.85)}
.smi.red .smil{color:#e53935}
.sdiv{height:1px;background:rgba(0,0,0,.06);margin:5px 0}
body.dark .sdiv{background:rgba(255,255,255,.06)}
.trow{display:flex;align-items:center;justify-content:space-between;padding:13px 20px;cursor:pointer}
.tl{display:flex;align-items:center;gap:13px}
.tsw{width:44px;height:24px;border-radius:12px;background:#ddd;position:relative;transition:.3s;cursor:pointer}
.tsw.on{background:var(--o)}
.tk{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:9px;background:white;transition:.3s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.tsw.on .tk{left:23px}
/* NEW CHAT MODAL */
.mo{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);display:none;align-items:flex-end}
.mo.show{display:flex}
.mc{width:100%;background:rgba(255,255,255,.97);border-radius:24px 24px 0 0;padding:24px 20px 44px;animation:su .35s ease}
body.dark .mc{background:rgba(18,18,18,.98)}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mh{width:36px;height:4px;border-radius:2px;background:#ddd;margin:0 auto 20px}
.mt{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:14px}
body.dark .mt{color:white}
.mi{width:100%;padding:13px 16px;border-radius:14px;border:1px solid rgba(0,0,0,.1);background:rgba(255,255,255,.9);font-family:'Montserrat',sans-serif;font-size:14px;color:#1a1a1a;outline:none;margin-bottom:10px}
body.dark .mi{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.12);color:white}
.mi:focus{border-color:var(--o)}
.mcancel{width:100%;padding:12px;border-radius:14px;border:1px solid rgba(0,0,0,.1);background:transparent;font-family:'Montserrat',sans-serif;font-size:14px;color:#888;cursor:pointer;margin-top:6px}
body.dark .mcancel{border-color:rgba(255,255,255,.1);color:rgba(255,255,255,.4)}
.uc{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;background:rgba(0,0,0,.04);margin-bottom:6px;cursor:pointer;transition:.15s}
body.dark .uc{background:rgba(255,255,255,.06)}
.uc:active{background:rgba(255,107,0,.1)}
.ucav{width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,var(--o),#ff3d00);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:white;flex-shrink:0;overflow:hidden}
.ucav img{width:100%;height:100%;object-fit:cover}
.ucn{font-size:14px;font-weight:700;color:#1a1a1a}
body.dark .ucn{color:white}
.ucu{font-size:12px;color:var(--o)}
.nores{text-align:center;padding:18px;color:#aaa;font-size:13px}
</style>
</head>
<body class="light">
<div class="bg"></div><div class="bgo"></div>
<div class="sdo" id="sdo" onclick="closeSd()"></div>
<div class="sd" id="sd">
  <div class="sdh">
    <div class="sdav" id="sdav">?</div>
    <div class="sdname" id="sdname">...</div>
    <div class="sdusr" id="sdusr">@...</div>
  </div>
  <div class="sdm">
    <div class="smi" onclick="go('profile.html')"><div class="smic">👤</div><div class="smil">Профиль</div></div>
    <div class="trow" onclick="toggleTheme()">
      <div class="tl"><div class="smic">🌙</div><div class="smil">Тёмная тема</div></div>
      <div class="tsw" id="tsw"><div class="tk"></div></div>
    </div>
    <div class="smi" onclick="go('settings.html')"><div class="smic">⚙️</div><div class="smil">Настройки</div></div>
    <div class="smi" onclick="go('settings.html')"><div class="smic">🔒</div><div class="smil">Конфиденциальность</div></div>
    <div class="sdiv"></div>
    <div class="smi"><div class="smic">❓</div><div class="smil">Помощь</div></div>
    <div class="sdiv"></div>
    <div class="smi red" onclick="doLogout()"><div class="smic">🚪</div><div class="smil">Выйти</div></div>
  </div>
</div>
<div class="app">
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:12px">
      <div class="mbtn" onclick="openSd()"><span></span><span></span><span></span></div>
      <div class="htitle">Чаты</div>
    </div>
    <div class="ibtn" onclick="document.getElementById('sinp').focus()">🔍</div>
  </div>
  <div class="sw">
    <div class="sb">
      <span style="color:#aaa;font-size:15px">🔍</span>
      <input id="sinp" type="text" placeholder="Поиск по @username..." oninput="findUser(this.value)">
    </div>
  </div>
  <div class="cl" id="cl">
    <div class="empty"><div class="ei">💬</div><div class="et">Нет чатов</div><div class="es">Нажми ✏️ и найди человека<br>по @username</div></div>
  </div>
</div>
<button class="fab" onclick="openNC()">✏️</button>
<div class="bnav">
  <div class="ni active"><div class="nicon">💬</div><div class="nlbl">Чаты</div></div>
  <div class="ni" onclick="go('bots.html')"><div class="nicon">🤖</div><div class="nlbl">Боты</div></div>
  <div class="ni" onclick="go('channels.html')"><div class="nicon">📢</div><div class="nlbl">Каналы</div></div>
  <div class="ni" onclick="go('groups.html')"><div class="nicon">👥</div><div class="nlbl">Группы</div></div>
</div>
<div class="mo" id="ncm" onclick="closeNC(event)">
  <div class="mc">
    <div class="mh"></div>
    <div class="mt">Новый чат ✏️</div>
    <input class="mi" id="nci" type="text" placeholder="Введите @username..." oninput="findUser(this.value)">
    <div id="ures"></div>
    <button class="mcancel" onclick="closeNC2()">Отмена</button>
  </div>
</div>
<script>
const FC={apiKey:"AIzaSyDrWwIDh_Y8Fji0KWiVbR2EcmUHl5c6mHM",authDomain:"keyji-974fb.firebaseapp.com",projectId:"keyji-974fb",storageBucket:"keyji-974fb.firebasestorage.app",messagingSenderId:"442818696289",appId:"1:442818696289:web:5ed15e6e31fb85ef2bc620"};
firebase.initializeApp(FC);
const auth=firebase.auth(),db=firebase.firestore();
let me=null,isDark=localStorage.getItem('keyji_theme')==='dark';
if(isDark){document.body.className='dark';document.getElementById('tsw').classList.add('on');}
else document.body.className='light';

auth.onAuthStateChanged(async u=>{
  if(!u){go('index.html');return;}
  me=u;
  const d=await db.collection('users').doc(u.uid).get();
  if(d.exists){
    const ud=d.data();
    if(ud.frozen){alert('Ваш аккаунт заморожен. Обратитесь в @spamkeyjibot');await auth.signOut();go('index.html');return;}
    const av=document.getElementById('sdav');
    if(ud.avatar){av.innerHTML=`<img src="${ud.avatar}">`;}else{av.textContent=(ud.name||'?')[0].toUpperCase();}
    document.getElementById('sdname').textContent=ud.name||'';
    document.getElementById('sdusr').textContent='@'+(ud.username||'');
    await db.collection('users').doc(u.uid).update({online:true,lastSeen:firebase.firestore.FieldValue.serverTimestamp()});
  }
  loadChats();
});

function loadChats(){
  db.collection('chats').where('participants','array-contains',me.uid)
    .orderBy('lastMessageTime','desc').onSnapshot(async snap=>{
      const cl=document.getElementById('cl');
      if(snap.empty){cl.innerHTML='<div class="empty"><div class="ei">💬</div><div class="et">Нет чатов</div><div class="es">Нажми ✏️ и найди человека</div></div>';return;}
      cl.innerHTML='';
      for(const d of snap.docs){
        const ch=d.data();
        const oid=ch.participants.find(p=>p!==me.uid);
        if(!oid)continue;
        const ud=await db.collection('users').doc(oid).get();
        if(!ud.exists)continue;
        const u=ud.data();
        const t=ch.lastMessageTime?new Date(ch.lastMessageTime.toDate()).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}):'';
        const el=document.createElement('div');el.className='ci';
        el.onclick=()=>{localStorage.setItem('kcid',d.id);localStorage.setItem('kcuid',oid);go('chat.html');};
        el.innerHTML=`<div class="av" style="background:linear-gradient(135deg,#FF6B00,#ff3d00)">${u.avatar?`<img src="${u.avatar}">`:(u.name||'?')[0].toUpperCase()}${u.online?'<div class="odot"></div>':''}</div><div class="ci-info"><div class="ci-name">${esc(u.name||'')}${u.verified?'<span class="vbdg"><svg viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="5" fill="#FF6B00"/><path d="M2.5 5l1.5 1.5 3-3" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>':''}</div><div class="ci-prev">${esc(ch.lastMessage||'...')}</div></div><div class="ci-meta"><div class="ci-t">${t}</div></div>`;
        cl.appendChild(el);
      }
    });
}

async function findUser(q){
  const res=document.getElementById('ures');
  if(!q||q.length<2){res.innerHTML='';return;}
  const uname=q.replace('@','').toLowerCase();
  const snap=await db.collection('users').where('username','==',uname).limit(5).get();
  res.innerHTML='';
  if(snap.empty){res.innerHTML='<div class="nores">Пользователь не найден</div>';return;}
  snap.forEach(d=>{
    const u=d.data();
    if(u.uid===me.uid)return;
    const el=document.createElement('div');el.className='uc';
    el.innerHTML=`<div class="ucav">${u.avatar?`<img src="${u.avatar}">`:(u.name||'?')[0].toUpperCase()}</div><div><div class="ucn">${esc(u.name||'')}</div><div class="ucu">@${u.username}</div></div>`;
    el.onclick=()=>startChat(u.uid);
    res.appendChild(el);
  });
}

async function startChat(uid){
  const cid=[me.uid,uid].sort().join('_');
  const ref=db.collection('chats').doc(cid);
  const ex=await ref.get();
  if(!ex.exists)await ref.set({participants:[me.uid,uid],lastMessage:'',lastMessageTime:firebase.firestore.FieldValue.serverTimestamp(),type:'private'});
  localStorage.setItem('kcid',cid);localStorage.setItem('kcuid',uid);go('chat.html');
}

function openNC(){document.getElementById('ncm').classList.add('show');}
function closeNC(e){if(e.target===document.getElementById('ncm'))closeNC2();}
function closeNC2(){document.getElementById('ncm').classList.remove('show');document.getElementById('nci').value='';document.getElementById('ures').innerHTML='';}
function openSd(){document.getElementById('sd').classList.add('open');document.getElementById('sdo').classList.add('show');}
function closeSd(){document.getElementById('sd').classList.remove('open');document.getElementById('sdo').classList.remove('show');}
function toggleTheme(){isDark=!isDark;document.body.className=isDark?'dark':'light';document.getElementById('tsw').classList.toggle('on',isDark);localStorage.setItem('keyji_theme',isDark?'dark':'light');}
async function doLogout(){if(me)await db.collection('users').doc(me.uid).update({online:false});await auth.signOut();go('index.html');}
function go(p){location.href='./'+p;}
function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
let sx=0;
document.addEventListener('touchstart',e=>sx=e.touches[0].clientX);
document.addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-sx;if(d>60&&sx<30)openSd();if(d<-60)closeSd();});
</script>
</body>
</html>
