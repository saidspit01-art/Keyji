<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>Keyji — Чаты</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{--orange:#FF6B00;--nav:72px}
    body{font-family:'Montserrat',sans-serif;overflow:hidden;height:100vh;background:#f5f0eb}
    body.dark{background:#0a0a0a}
    .bg{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center}
    body.light .bg{background-image:url('https://i.ibb.co/zTS53bWc/file-000000004b807246a5c9c164255caecf.jpg')}
    body.dark .bg{background-image:url('https://i.ibb.co/Pv1Y3F9T/file-0000000062f47246b948af6a043288a5.jpg')}
    body.light .bgo{background:rgba(255,255,255,.15)}
    body.dark .bgo{background:rgba(0,0,0,.35)}
    .bgo{position:fixed;inset:0;z-index:1}
    .app{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column}
    .header{display:flex;align-items:center;justify-content:space-between;padding:52px 16px 14px;background:rgba(255,255,255,.45);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.6)}
    body.dark .header{background:rgba(0,0,0,.5);border-bottom-color:rgba(255,255,255,.08)}
    .menu-btn{width:40px;height:40px;border-radius:12px;border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.3);backdrop-filter:blur(10px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;transition:.2s}
    body.dark .menu-btn{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15)}
    .menu-btn span{width:18px;height:2px;border-radius:2px;background:#333}
    body.dark .menu-btn span{background:white}
    .menu-btn:active{transform:scale(.92)}
    .htitle{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:700;color:#1a1a1a}
    body.dark .htitle{color:white}
    .hright{display:flex;gap:10px}
    .ibtn{width:40px;height:40px;border-radius:12px;border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.3);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:.2s}
    body.dark .ibtn{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15)}
    .ibtn:active{transform:scale(.92)}
    .swrap{padding:10px 16px 6px}
    .sbox{display:flex;align-items:center;gap:10px;padding:11px 16px;border-radius:16px;background:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.7);backdrop-filter:blur(10px)}
    body.dark .sbox{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.12)}
    .sbox input{flex:1;border:none;background:transparent;font-family:'Montserrat',sans-serif;font-size:14px;color:#333;outline:none}
    body.dark .sbox input{color:white}
    .sbox input::placeholder{color:#aaa}
    .clist{flex:1;overflow-y:auto;padding:4px 0 calc(var(--nav) + 16px)}
    .clist::-webkit-scrollbar{display:none}
    .ci{display:flex;align-items:center;gap:14px;padding:13px 16px;margin:3px 10px;border-radius:18px;background:rgba(255,255,255,.45);border:1px solid rgba(255,255,255,.65);backdrop-filter:blur(12px);cursor:pointer;transition:.2s;position:relative}
    body.dark .ci{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.1)}
    .ci:active{transform:scale(.98)}
    .av{width:52px;height:52px;border-radius:16px;object-fit:cover;flex-shrink:0;border:2px solid rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:white}
    .cinfo{flex:1;min-width:0}
    .cname{font-size:15px;font-weight:700;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;display:flex;align-items:center;gap:6px}
    body.dark .cname{color:white}
    .cprev{font-size:13px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    body.dark .cprev{color:rgba(255,255,255,.45)}
    .cmeta{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
    .ctime{font-size:12px;color:#aaa}
    body.dark .ctime{color:rgba(255,255,255,.35)}
    .badge{min-width:20px;height:20px;border-radius:10px;background:var(--orange);color:white;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 6px}
    .vbadge{width:18px;height:18px;border-radius:50%;background:white;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
    .vbadge svg{width:11px;height:11px}
    .online-dot{width:12px;height:12px;border-radius:50%;background:#4CAF50;border:2px solid white;position:absolute;bottom:10px;left:50px}
    body.dark .online-dot{border-color:#1a1a1a}
    .fab{position:fixed;bottom:calc(var(--nav) + 20px);right:20px;width:52px;height:52px;border-radius:16px;background:var(--orange);border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(255,107,0,.4);cursor:pointer;z-index:10;transition:.2s;font-size:22px;color:white}
    .fab:active{transform:scale(.92)}
    .bnav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);display:flex;align-items:center;justify-content:space-around;background:rgba(255,255,255,.6);border-top:1px solid rgba(255,255,255,.7);backdrop-filter:blur(20px);z-index:10;padding-bottom:8px}
    body.dark .bnav{background:rgba(10,10,10,.75);border-top-color:rgba(255,255,255,.1)}
    .ni{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:6px 16px;border-radius:14px;transition:.2s;flex:1}
    .ni:active{transform:scale(.92)}
    .nicon{font-size:22px;transition:transform .2s}
    .nlabel{font-size:10px;font-weight:600;color:#aaa;letter-spacing:.5px}
    .ni.active .nlabel{color:var(--orange)}
    .ni.active .nicon{transform:scale(1.15)}
    /* SIDEBAR */
    .sdo{position:fixed;inset:0;z-index:20;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:.3s}
    .sdo.show{opacity:1;pointer-events:all}
    .sd{position:fixed;top:0;left:-300px;bottom:0;width:280px;z-index:21;transition:left .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;background:rgba(255,255,255,.75);backdrop-filter:blur(30px);border-right:1px solid rgba(255,255,255,.6)}
    body.dark .sd{background:rgba(15,15,15,.9);border-right-color:rgba(255,255,255,.08)}
    .sd.open{left:0}
    .sdh{padding:60px 24px 24px;border-bottom:1px solid rgba(0,0,0,.06)}
    body.dark .sdh{border-bottom-color:rgba(255,255,255,.06)}
    .sdav{width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,var(--orange),#ff3d00);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:white;margin-bottom:12px;border:2px solid rgba(255,255,255,.4)}
    .sdname{font-size:17px;font-weight:700;color:#1a1a1a;margin-bottom:2px}
    body.dark .sdname{color:white}
    .sdusr{font-size:13px;color:#888}
    body.dark .sdusr{color:rgba(255,255,255,.4)}
    .accs{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
    .acc{padding:5px 12px;border-radius:20px;background:rgba(255,107,0,.12);border:1px solid rgba(255,107,0,.2);font-size:12px;font-weight:600;color:var(--orange);cursor:pointer}
    .accadd{padding:5px 12px;border-radius:20px;background:rgba(0,0,0,.05);border:1px solid rgba(0,0,0,.1);font-size:12px;font-weight:600;color:#888;cursor:pointer}
    body.dark .accadd{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.1);color:rgba(255,255,255,.4)}
    .sdm{flex:1;overflow-y:auto;padding:12px 0}
    .smi{display:flex;align-items:center;gap:14px;padding:14px 24px;cursor:pointer;transition:background .2s}
    .smi:active{background:rgba(255,107,0,.08)}
    .smic{font-size:20px;width:24px;text-align:center}
    .smil{font-size:15px;font-weight:600;color:#333}
    body.dark .smil{color:rgba(255,255,255,.85)}
    .smi.danger .smil{color:#e53935}
    .sdiv{height:1px;background:rgba(0,0,0,.06);margin:8px 0}
    body.dark .sdiv{background:rgba(255,255,255,.06)}
    .trow{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;cursor:pointer}
    .tl{display:flex;align-items:center;gap:14px}
    .tsw{width:44px;height:24px;border-radius:12px;background:#ddd;position:relative;transition:background .3s;cursor:pointer}
    .tsw.on{background:var(--orange)}
    .tk{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:9px;background:white;transition:left .3s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
    .tsw.on .tk{left:23px}
    /* EMPTY STATE */
    .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 32px;text-align:center;flex:1}
    .empty-icon{font-size:64px;margin-bottom:16px;opacity:.7}
    .empty-title{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:8px}
    body.dark .empty-title{color:white}
    .empty-sub{font-size:13px;color:#999;line-height:1.6}
  </style>
</head>
<body class="light">
<div class="bg"></div><div class="bgo"></div>
<div class="sdo" id="sdo" onclick="closeSd()"></div>
<div class="sd" id="sd">
  <div class="sdh">
    <div class="sdav" id="sd-av">?</div>
    <div class="sdname" id="sd-name">...</div>
    <div class="sdusr" id="sd-usr">@...</div>
    <div class="accs">
      <div class="acc" id="sd-acc">Аккаунт 1</div>
      <div class="accadd" onclick="alert('Максимум 5 аккаунтов')">+ Добавить</div>
    </div>
  </div>
  <div class="sdm">
    <div class="smi" onclick="location.href='profile.html'"><div class="smic">👤</div><div class="smil">Профиль</div></div>
    <div class="trow" onclick="toggleTheme()">
      <div class="tl"><div class="smic">🌙</div><div class="smil">Тёмная тема</div></div>
      <div class="tsw" id="tsw"><div class="tk"></div></div>
    </div>
    <div class="smi" onclick="location.href='settings.html'"><div class="smic">⚙️</div><div class="smil">Настройки</div></div>
    <div class="smi"><div class="smic">🔔</div><div class="smil">Уведомления</div></div>
    <div class="smi" onclick="location.href='settings.html'"><div class="smic">🔒</div><div class="smil">Конфиденциальность</div></div>
    <div class="sdiv"></div>
    <div class="smi"><div class="smic">❓</div><div class="smil">Помощь</div></div>
    <div class="sdiv"></div>
    <div class="smi danger" onclick="doLogout()"><div class="smic">🚪</div><div class="smil">Выйти</div></div>
  </div>
</div>
<div class="app">
  <div class="header">
    <div style="display:flex;align-items:center;gap:12px">
      <div class="menu-btn" onclick="openSd()"><span></span><span></span><span></span></div>
      <div class="htitle">Чаты</div>
    </div>
    <div class="hright"><div class="ibtn" onclick="focusSearch()">🔍</div></div>
  </div>
  <div class="swrap">
    <div class="sbox">
      <span style="color:#aaa">🔍</span>
      <input type="text" id="search-input" placeholder="Поиск по юзернейму..." oninput="searchChats(this.value)">
    </div>
  </div>
  <div class="clist" id="clist">
    <div class="empty">
      <div class="empty-icon">💬</div>
      <div class="empty-title">Нет чатов</div>
      <div class="empty-sub">Найди друга по юзернейму<br>и начни общение</div>
    </div>
  </div>
</div>
<button class="fab" onclick="showNewChat()">✏️</button>
<div class="bnav">
  <div class="ni active"><div class="nicon">💬</div><div class="nlabel">Чаты</div></div>
  <div class="ni" onclick="location.href='bots.html'"><div class="nicon">🤖</div><div class="nlabel">Боты</div></div>
  <div class="ni" onclick="location.href='channels.html'"><div class="nicon">📢</div><div class="nlabel">Каналы</div></div>
  <div class="ni" onclick="location.href='groups.html'"><div class="nicon">👥</div><div class="nlabel">Группы</div></div>
</div>

<!-- NEW CHAT MODAL -->
<div id="ncModal" style="display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);align-items:flex-end">
  <div style="width:100%;background:rgba(255,255,255,.97);border-radius:24px 24px 0 0;padding:24px 20px 44px">
    <div style="width:36px;height:4px;border-radius:2px;background:#ddd;margin:0 auto 20px"></div>
    <div style="font-family:'Noto Serif JP',serif;font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:16px">Новый чат</div>
    <input id="nc-input" type="text" placeholder="@username" style="width:100%;padding:14px 16px;border-radius:14px;border:1px solid rgba(0,0,0,.1);font-family:'Montserrat',sans-serif;font-size:14px;outline:none;margin-bottom:12px" oninput="searchUser(this.value)">
    <div id="nc-results"></div>
    <button onclick="closeNC()" style="width:100%;padding:13px;border-radius:14px;border:1px solid rgba(0,0,0,.1);background:transparent;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:600;color:#888;cursor:pointer;margin-top:8px">Отмена</button>
  </div>
</div>

<script>
  const FC = {apiKey:"AIzaSyDrWwIDh_Y8Fji0KWiVbR2EcmUHl5c6mHM",authDomain:"keyji-974fb.firebaseapp.com",projectId:"keyji-974fb",storageBucket:"keyji-974fb.firebasestorage.app",messagingSenderId:"442818696289",appId:"1:442818696289:web:5ed15e6e31fb85ef2bc620"};
  if (!firebase.apps.length) firebase.initializeApp(FC);
  const auth = firebase.auth();
  const db = firebase.firestore();
  let currentUser = null;
  let isDark = localStorage.getItem('keyji_theme') === 'dark';
  if (isDark) { document.body.className = 'dark'; document.getElementById('tsw').classList.add('on'); }

  auth.onAuthStateChanged(async user => {
    if (!user) { window.location.href = './index.html'; return; }
    currentUser = user;
    const doc = await db.collection('users').doc(user.uid).get();
    if (doc.exists) {
      const d = doc.data();
      document.getElementById('sd-av').textContent = d.name ? d.name[0].toUpperCase() : '?';
      document.getElementById('sd-name').textContent = d.name || '';
      document.getElementById('sd-usr').textContent = '@' + (d.username || '');
      document.getElementById('sd-acc').textContent = d.name || 'Аккаунт';
    }
    loadChats();
  });

  function loadChats() {
    db.collection('chats').where('participants','array-contains',currentUser.uid)
      .orderBy('lastMessageTime','desc').onSnapshot(snap => {
        const list = document.getElementById('clist');
        if (snap.empty) {
          list.innerHTML = '<div class="empty"><div class="empty-icon">💬</div><div class="empty-title">Нет чатов</div><div class="empty-sub">Найди друга по юзернейму<br>и начни общение</div></div>';
          return;
        }
        list.innerHTML = '';
        snap.forEach(async d => {
          const chat = d.data();
          const otherId = chat.participants.find(p => p !== currentUser.uid);
          if (!otherId) return;
          const userDoc = await db.collection('users').doc(otherId).get();
          if (!userDoc.exists) return;
          const u = userDoc.data();
          const time = chat.lastMessageTime ? new Date(chat.lastMessageTime.toDate()).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}) : '';
          const item = document.createElement('div');
          item.className = 'ci';
          item.onclick = () => { localStorage.setItem('keyji_chat_id', d.id); localStorage.setItem('keyji_chat_user', otherId); window.location.href = './chat.html'; };
          item.innerHTML = `
            <div class="av" style="background:linear-gradient(135deg,#FF6B00,#ff3d00)">${u.avatar ? `<img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:14px">` : (u.name||'?')[0].toUpperCase()}</div>
            ${u.online ? '<div class="online-dot"></div>' : ''}
            <div class="cinfo">
              <div class="cname">${u.name||''}${u.verified?'<span class="vbadge"><svg viewBox="0 0 11 11" fill="none"><circle cx="5.5" cy="5.5" r="5.5" fill="#FF6B00"/><path d="M3 5.5l1.5 1.5 3.5-3.5" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>':''}</div>
              <div class="cprev">${chat.lastMessage||'...'}</div>
            </div>
            <div class="cmeta"><div class="ctime">${time}</div></div>`;
          list.appendChild(item);
        });
      });
  }

  async function searchUser(q) {
    const res = document.getElementById('nc-results');
    if (q.length < 2) { res.innerHTML = ''; return; }
    const username = q.replace('@','').toLowerCase();
    const snap = await db.collection('users').where('username','==',username).limit(5).get();
    res.innerHTML = '';
    snap.forEach(d => {
      const u = d.data();
      if (u.uid === currentUser.uid) return;
      const div = document.createElement('div');
      div.style.cssText = 'display:flex;align-items:center;gap:12px;padding:12px;border-radius:14px;background:rgba(0,0,0,.04);margin-bottom:8px;cursor:pointer';
      div.innerHTML = `<div style="width:44px;height:44px;border-radius:13px;background:linear-gradient(135deg,#FF6B00,#ff3d00);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:white">${(u.name||'?')[0].toUpperCase()}</div><div><div style="font-size:14px;font-weight:700;color:#1a1a1a">${u.name}</div><div style="font-size:12px;color:#FF6B00">@${u.username}</div></div>`;
      div.onclick = () => startChat(u.uid);
      res.appendChild(div);
    });
    if (snap.empty) res.innerHTML = '<div style="text-align:center;padding:20px;color:#aaa;font-size:13px">Пользователь не найден</div>';
  }

  async function startChat(uid) {
    const chatId = [currentUser.uid, uid].sort().join('_');
    const chatRef = db.collection('chats').doc(chatId);
    const existing = await chatRef.get();
    if (!existing.exists) {
      await chatRef.set({ participants: [currentUser.uid, uid], lastMessage: '', lastMessageTime: firebase.firestore.FieldValue.serverTimestamp(), type: 'private' });
    }
    localStorage.setItem('keyji_chat_id', chatId);
    localStorage.setItem('keyji_chat_user', uid);
    window.location.href = './chat.html';
  }

  function searchChats(q) {}
  function showNewChat() { const m = document.getElementById('ncModal'); m.style.display='flex'; }
  function closeNC() { document.getElementById('ncModal').style.display='none'; document.getElementById('nc-input').value=''; document.getElementById('nc-results').innerHTML=''; }
  function focusSearch() { document.getElementById('search-input').focus(); }
  function openSd() { document.getElementById('sd').classList.add('open'); document.getElementById('sdo').classList.add('show'); }
  function closeSd() { document.getElementById('sd').classList.remove('open'); document.getElementById('sdo').classList.remove('show'); }
  function toggleTheme() { isDark=!isDark; document.body.className=isDark?'dark':'light'; document.getElementById('tsw').classList.toggle('on',isDark); localStorage.setItem('keyji_theme',isDark?'dark':'light'); }
  async function doLogout() { await db.collection('users').doc(currentUser.uid).update({online:false}); await auth.signOut(); window.location.href='./index.html'; }

  let startX=0;
  document.addEventListener('touchstart',e=>startX=e.touches[0].clientX);
  document.addEventListener('touchend',e=>{ const d=e.changedTouches[0].clientX-startX; if(d>60&&startX<30)openSd(); if(d<-60)closeSd(); });
</script>
</body>
</html>
